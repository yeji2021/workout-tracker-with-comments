<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0b0d10" />
    <!-- FOUC 방지: 첫 페인트 전에 저장된 테마를 적용 (theme-color 메타 뒤에 위치) -->
    <script>
      (function () {
        try {
          var el = document.documentElement
          var m = document.querySelector('meta[name="theme-color"]')
          var t = localStorage.getItem('wt-theme')
          if (t === 'dark' || t === 'light' || t === 'rilakkuma') {
            el.dataset.theme = t
            var c = { dark: '#0b0d10', light: '#f6f7f9', rilakkuma: '#f2e2c9' }[t]
            if (m && c) m.setAttribute('content', c)
          } else if (t === 'custom') {
            var p = JSON.parse(localStorage.getItem('wt-custom-palette') || 'null')
            if (p && p['--color-bg']) {
              el.dataset.theme = 'custom'
              for (var k in p) {
                if (k.indexOf('--color-') === 0) el.style.setProperty(k, p[k])
              }
              if (m) m.setAttribute('content', p['--color-bg'])
            }
          }
        } catch (e) {}
      })()
    </script>
    <!-- iOS PWA "홈 화면에 추가" 대응 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="운동기록" />
    <title>운동 트래커</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
